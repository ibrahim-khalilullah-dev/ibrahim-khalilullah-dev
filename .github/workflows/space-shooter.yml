name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically once a day at midnight
  push:
    branches:
      - main # This line makes the game run immediately every time you save!
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
          fps: '20'